force_refresh:
  name: Force refresh
  description: Bypass cache and immediately fetch latest electricity price forecast from the API.
  fields:
    entry_id:
      name: Integration entry
      description: The config entry ID to refresh. Leave empty to refresh all entries.
      example: "abc123def456"
      required: false
      selector:
        text: {}

get_prices:
  name: Get prices
  description: Return cached electricity price forecast data as a service response. Useful in templates and automations.
  fields:
    entry_id:
      name: Integration entry
      description: The config entry ID. Leave empty to use the first configured instance.
      example: "abc123def456"
      required: false
      selector:
        text: {}